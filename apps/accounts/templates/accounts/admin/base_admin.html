<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Admin{% endblock %}</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root{
      --bg:#070b14;
      --panel:#0b1220;
      --panel2:#0f1a2e;
      --line:rgba(255,255,255,.10);
      --line2:rgba(0,212,255,.20);
      --text:#eaf2ff;
      --muted:rgba(234,242,255,.62);
      --cyan:#00d4ff;
      --danger:#ef4444;
      --ok:#22c55e;
      --warn:#f59e0b;
      --vio:#a78bfa;
    }
    *{box-sizing:border-box;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Arial;color:var(--text)}

    html, body{height:100%;}

    body{
      margin:0;
      background:
        radial-gradient(1200px 700px at 18% 0%, rgba(0,212,255,.14), transparent 55%),
        radial-gradient(900px 500px at 90% 30%, rgba(33,230,255,.10), transparent 55%),
        linear-gradient(180deg, #060914, var(--bg));
      min-height:100vh;

      /* ✅ endi umumiy scroll BODY’da emas */
      overflow:hidden;
    }

    a{color:inherit;text-decoration:none}

    /* ✅ layout ekran bo‘yi */
    .layout{
      display:flex;
      height:100vh;      /* min-height emas */
      overflow:hidden;   /* ichki scrolllar .sidebar va .main’da */
    }

    /* ✅ sidebar joyida qotsin + o‘zida scroll bo‘lsin */
    .sidebar{
      width:280px;
      padding:22px 18px;
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border-right:1px solid var(--line);
      backdrop-filter: blur(10px);

      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    .brand{
      display:flex; gap:10px; align-items:center;
      padding:14px 14px; border:1px solid var(--line);
      border-radius:16px; background: rgba(0,0,0,.18);
      box-shadow: 0 12px 28px rgba(0,0,0,.25);
      margin-bottom:18px;
    }
    .logo{
      width:40px; height:40px; border-radius:12px;
      background: radial-gradient(circle at 30% 30%, rgba(0,212,255,.9), rgba(0,212,255,.15));
      border:1px solid var(--line2);
      box-shadow: 0 0 20px rgba(0,212,255,.18);
      flex:0 0 40px;
    }
    .brand b{display:block; font-size:14px}
    .brand span{display:block; font-size:12px; color:var(--muted)}

    .section-title{font-size:12px; letter-spacing:.2px; color:var(--muted); margin:18px 10px 10px;}
    .nav a{
      display:flex; align-items:center; gap:10px;
      padding:12px 12px; border-radius:14px;
      border:1px solid var(--line);
      background: rgba(0,0,0,.14);
      margin:10px 0;
      transition:.2s;
    }
    .nav a:hover{border-color:rgba(0,212,255,.35); box-shadow:0 0 0 3px rgba(0,212,255,.08) inset;}
    .nav a.active{border-color:rgba(0,212,255,.45); background: rgba(0,212,255,.08);}

    .logout{
      margin-top:18px;
      display:block;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid rgba(239,68,68,.35);
      background: rgba(239,68,68,.08);
      text-align:center;
    }

    /* ✅ kontent scrolli shu yerda */
    .main{
      flex:1;
      height:100vh;
      overflow:auto;     /* ✅ tepa/pastga scroll */
      padding:22px;
    }

    .topbar{
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 16px;
      border:1px solid var(--line);
      border-radius:18px;
      background: rgba(0,0,0,.16);
      backdrop-filter: blur(10px);
      box-shadow: 0 14px 30px rgba(0,0,0,.22);
      gap: 12px;

      position: sticky;
      top: 5px;
      z-index: 1000;
    }
    .topbar .crumb{color:var(--muted); font-size:13px; flex:1;}
    .userchip{
      display:flex; align-items:center; gap:10px;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background: rgba(255,255,255,.04);
      white-space:nowrap;
    }
    .avatar{
      width:30px;height:30px;border-radius:999px;
      background: radial-gradient(circle at 30% 30%, rgba(0,212,255,.9), rgba(0,212,255,.18));
      border:1px solid var(--line2);
    }

    .content{margin-top: 18px;
    margin-bottom: 50px;}
    .card{
      border:1px solid var(--line);
      background: rgba(0,0,0,.14);
      border-radius:18px;
      padding:14px;
      box-shadow: 0 16px 34px rgba(0,0,0,.22);
      backdrop-filter: blur(10px);
    }

    /* util btn */
    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      padding:12px 14px; border-radius:14px;
      border:1px solid rgba(0,212,255,.40);
      background: rgba(0,212,255,.10);
      transition:.2s;
      cursor:pointer;
      font-weight:750;
    }
    .btn:hover{background: rgba(0,212,255,.16); box-shadow:0 0 0 3px rgba(0,212,255,.10) inset;}
    .btn2{
      display:inline-flex; align-items:center; justify-content:center;
      padding:12px 14px; border-radius:14px;
      border:1px solid var(--line);
      background: rgba(0,0,0,.12);
      cursor:pointer;
      font-weight:650;
    }
    .btn2:hover{border-color: rgba(0,212,255,.30); box-shadow:0 0 0 3px rgba(0,212,255,.08) inset;}
    .btn-danger{
      border-color: rgba(239,68,68,.35);
      background: rgba(239,68,68,.10);
    }
    .btn-danger:hover{box-shadow:0 0 0 3px rgba(239,68,68,.10) inset;}

    /* ===== Mobile sidebar drawer ===== */
    .menu-btn{
      display:none;
      width:44px; height:44px;
      border-radius:14px;
      border:1px solid var(--line);
      background: rgba(0,0,0,.14);
      backdrop-filter: blur(10px);
      cursor:pointer;
      align-items:center; justify-content:center;
      flex:0 0 auto;
    }
    .menu-btn:hover{border-color:rgba(0,212,255,.35); box-shadow:0 0 0 3px rgba(0,212,255,.08) inset;}
    .menu-btn i{font-size:18px;}

    .drawer-overlay{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(2px);
      opacity:0;
      pointer-events:none;
      transition: .22s ease;
      z-index: 1200;
    }

    /* ✅ endi body doim overflow:hidden bo‘lgani uchun,
       drawer ochilganda qo‘shimcha ish shart emas, lekin qoldiramiz */
    body.no-scroll{ overflow:hidden; }

    @media (max-width: 900px){
      /* Mobil rejimda sidebar drawer bo‘lib chiqadi */
      .sidebar{
        position:fixed;
        top:0; left:0;
        height:100vh;
        width: 300px;
        max-width: 86vw;
        z-index: 1300;
        transform: translateX(-105%);
        transition: transform .26s ease;
        border-right:1px solid var(--line);
        overflow:auto; /* drawer ichida scroll */
      }
      .layout.drawer-open .sidebar{ transform: translateX(0); }
      .layout.drawer-open + .drawer-overlay{
        opacity:1;
        pointer-events:auto;
      }

      .menu-btn{display:inline-flex;}

      .main{padding:16px;}
      .topbar{top:10px;}

      #menuClose{
        display:inline-flex !important;
        align-items:center;
        justify-content:center;
      }
    }

    @media (min-width: 601px) and (max-width: 900px){
      .sidebar{ width: 340px; }
    }
  </style>

  {% block extra_css %}{% endblock %}
</head>

<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand" style="justify-content:space-between;">
        <div style="display:flex; gap:10px; align-items:center;">
          <div class="logo" style="display:flex;align-items:center;justify-content:center;font-size:18px;">
            <i class="fa-solid fa-robot"></i>
          </div>
          <div>
            <b><i class="fa-solid fa-microchip" style="margin-right:6px;"></i> Admin Panel</b>
            <span>Admin / Loyihalar</span>
          </div>
        </div>

        <button type="button"
                id="menuClose"
                aria-label="Menyuni yopish"
                style="display:none; width:40px; height:40px; border-radius:14px; border:1px solid var(--line);
                       background: rgba(0,0,0,.14); cursor:pointer;">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <div class="section-title">BO‘LIMLAR</div>

      <nav class="nav" id="drawerNav">
        <a class="{% block nav_dash %}{% endblock %}" href="{% url 'admin_dashboard' %}">
          <i class="fa-solid fa-chart-line" style="width:18px;"></i>
          Dashboard
        </a>

        <a class="{% block nav_projects %}{% endblock %}" href="{% url 'admin_project_list' %}">
          <i class="fa-solid fa-folder-open" style="width:18px;"></i>
          Mening loyihalarim
        </a>

        <a class="{% block nav_create %}{% endblock %}" href="{% url 'admin_project_create' %}">
          <i class="fa-solid fa-plus-circle" style="width:18px;"></i>
          Yangi loyiha
        </a>
      </nav>

      <a class="logout" href="{% url 'logout' %}">
        <i class="fa-solid fa-right-from-bracket"></i> Chiqish
      </a>
    </aside>

    <main class="main">
      <div class="topbar">
        <button class="menu-btn" type="button" aria-label="Menyuni ochish" id="menuOpen">
          <i class="fa-solid fa-bars"></i>
        </button>

        <div class="crumb">{% block crumb %}Admin paneli{% endblock %}</div>

        <div class="userchip">
          <div class="avatar" style="display:flex;align-items:center;justify-content:center;font-size:14px;">
            <i class="fa-solid fa-user"></i>
          </div>
          <div style="font-size:13px; color:var(--muted); display:flex; align-items:center; gap:6px;">
            {{ request.user.first_name }} {{ request.user.last_name }}
          </div>
        </div>
      </div>

      <div class="content">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>

  <div class="drawer-overlay" id="drawerOverlay" aria-hidden="true"></div>

  {% block extra_js %}{% endblock %}

  <script>
    (function(){
      const layout = document.querySelector('.layout');
      const overlay = document.getElementById('drawerOverlay');
      const openBtn = document.getElementById('menuOpen');
      const closeBtn = document.getElementById('menuClose');
      const nav = document.getElementById('drawerNav');

      function openDrawer(){
        layout.classList.add('drawer-open');
        document.body.classList.add('no-scroll');
      }
      function closeDrawer(){
        layout.classList.remove('drawer-open');
        document.body.classList.remove('no-scroll');
      }

      openBtn && openBtn.addEventListener('click', openDrawer);
      closeBtn && closeBtn.addEventListener('click', closeDrawer);
      overlay && overlay.addEventListener('click', closeDrawer);

      nav && nav.addEventListener('click', (e) => {
        const a = e.target.closest('a');
        if(a && window.innerWidth <= 900) closeDrawer();
      });

      document.addEventListener('keydown', (e) => {
        if(e.key === 'Escape') closeDrawer();
      });

      window.addEventListener('resize', () => {
        if(window.innerWidth > 900) closeDrawer();
      });
    })();
  </script>
</body>
</html>
